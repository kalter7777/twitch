<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream</title>
    <style>
        html, body { background: #000; margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #twitch-embed { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="twitch-embed"></div>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const channelName = urlParams.get('channel') || 'kaltertv'; 

        new Twitch.Player("twitch-embed", {
            channel: channelName,
            width: "100%",
            height: "100%",
            muted: true,
            autoplay: true,
            // ИСПРАВЛЕНО: Указан ваш точный домен для авторизации плеера
            parent: ["kalter7777.github.io"]
        });
    </script>
</body>
</html>
