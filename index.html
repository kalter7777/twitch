<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream</title>
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #twitch-embed { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="twitch-embed"></div>
    <script src="https://twitch.tv"></script>
    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const channelName = urlParams.get('channel') || 'kaltertv'; // Твой ник по умолчанию

        new Twitch.Player("twitch-embed", {
            channel: channelName,
            width: "100%",
            height: "100%",
            muted: true, // Без звука, чтобы сервера Google не тратили память
            autoplay: true
        });
    </script>
</body>
</html>
